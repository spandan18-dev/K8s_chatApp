apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deploy
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: chat-mongo
  template:
    metadata:
      name: mongo-pod
      namespace: chat-app
      labels:
        app: chat-mongo
    spec:
      containers:
        - name: chat-mongo
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: mongoadmin
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: secret
      volumes: 
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc

