apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: chat-frontend
  template:
    metadata:
      name: frontend-pod
      namespace: chat-app
      labels:
        app: chat-frontend
    spec:
      containers:
        - name: chat-frontend
          image: spandan735/chatapp-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: NODE_ENV
              value: production
